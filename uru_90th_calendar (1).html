<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ปฏิทินกิจกรรม 90 ปี มหาวิทยาลัยราชภัฏอุตรดิตถ์</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0d2f5e;
    --blue: #1a5276;
    --blue-mid: #2e86c1;
    --blue-light: #d6eaf8;
    --gold: #c9930a;
    --gold-dark: #9a6f08;
    --gold-light: #fef5e4;
    --text: #1a1a2e;
    --text-sub: #4a5568;
    --text-muted: #8a9ab5;
    --bg: #f5f7fb;
    --white: #ffffff;
    --border: #dde3ef;
    --radius: 12px;
    --tag-dev: #e8f5e9; --tag-dev-text: #2e7d32;
    --tag-sci: #e3f2fd; --tag-sci-text: #1565c0;
    --tag-art: #fce4ec; --tag-art-text: #ad1457;
    --tag-main: #fff8e1; --tag-main-text: #f57f17;
    --tag-health: #fbe9e7; --tag-health-text: #bf360c;
  }
  body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  .site-header {
    background: var(--navy);
    padding: 2rem 1.5rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .site-header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 75% 10%, rgba(201,147,10,.22) 0%, transparent 55%),
                radial-gradient(ellipse at 15% 90%, rgba(46,134,193,.2) 0%, transparent 50%);
    pointer-events: none;
  }
  .header-inner {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    max-width: 700px;
    margin: 0 auto;
    flex-wrap: wrap;
  }
  .header-logo {
    width: 120px;
    height: auto;
    flex-shrink: 0;
    filter: drop-shadow(0 2px 12px rgba(201,147,10,.3));
  }
  .header-text { text-align: left; }
  .header-badge {
    display: inline-block;
    background: var(--gold);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .08em;
    padding: 3px 12px;
    border-radius: 20px;
    margin-bottom: 10px;
  }
  .site-header h1 {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
    line-height: 1.45;
  }
  .site-header p {
    font-size: 13px;
    color: rgba(255,255,255,.7);
    line-height: 1.65;
  }
  .header-period {
    display: inline-block;
    margin-top: 10px;
    background: rgba(255,255,255,.1);
    border: 1px solid rgba(255,255,255,.2);
    border-radius: 20px;
    padding: 3px 14px;
    font-size: 12px;
    color: rgba(255,255,255,.85);
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    justify-content: center;
    background: var(--white);
    border-bottom: 1px solid var(--border);
  }
  .stat-item {
    flex: 1; max-width: 160px;
    text-align: center;
    padding: 14px 8px;
    border-right: 1px solid var(--border);
  }
  .stat-item:last-child { border-right: none; }
  .stat-num { font-size: 22px; font-weight: 700; color: var(--blue); }
  .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* TABS */
  .tab-wrap {
    display: flex; gap: 8px;
    padding: 1.25rem 1.5rem .5rem;
    max-width: 860px; margin: 0 auto;
    flex-wrap: wrap;
  }
  .tab-btn {
    padding: 8px 20px; border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--white); color: var(--text-sub);
    font-family: 'Sarabun', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all .18s;
    display: flex; align-items: center; gap: 6px;
  }
  .tab-btn:hover { border-color: var(--blue-mid); color: var(--blue); }
  .tab-btn.active { background: var(--navy); color: #fff; border-color: var(--navy); }
  .tab-btn .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; opacity: .5; flex-shrink: 0; }
  .tab-btn.active .dot { opacity: 1; background: var(--gold); }

  /* CONTENT */
  .content { max-width: 860px; margin: 0 auto; padding: 1rem 1.5rem 3rem; }
  .month-section { display: none; }
  .month-section.active { display: block; }
  .month-header {
    display: flex; align-items: baseline; gap: 10px;
    margin-bottom: 1rem; padding-bottom: 10px;
    border-bottom: 2px solid var(--blue-light);
  }
  .month-title { font-size: 20px; font-weight: 700; color: var(--navy); }
  .month-count { font-size: 13px; color: var(--text-muted); }

  /* CARDS */
  .card {
    background: var(--white); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1rem 1.25rem;
    margin-bottom: 10px; display: flex; gap: 1rem;
    align-items: flex-start; transition: box-shadow .15s; position: relative;
  }
  .card:hover { box-shadow: 0 4px 16px rgba(13,47,94,.08); }
  .card-date {
    background: var(--blue-light); color: var(--blue);
    border-radius: 8px; padding: 8px 10px;
    font-size: 12px; font-weight: 600;
    min-width: 82px; text-align: center;
    flex-shrink: 0; line-height: 1.4;
  }
  .card-body { flex: 1; min-width: 0; }
  .card-name { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 5px; line-height: 1.45; }
  .card-meta { font-size: 13px; color: var(--text-sub); margin-bottom: 3px; display: flex; align-items: flex-start; gap: 5px; }
  .card-meta svg { flex-shrink: 0; margin-top: 2px; }
  .tag { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; margin-top: 6px; }
  .tag-dev { background: var(--tag-dev); color: var(--tag-dev-text); }
  .tag-sci { background: var(--tag-sci); color: var(--tag-sci-text); }
  .tag-art { background: var(--tag-art); color: var(--tag-art-text); }
  .tag-main { background: var(--tag-main); color: var(--tag-main-text); }
  .tag-health { background: var(--tag-health); color: var(--tag-health-text); }

  /* ADMIN */
  .admin-toggle-btn {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--navy); color: #fff;
    border: none; border-radius: 50px; padding: 12px 20px;
    font-family: 'Sarabun', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; box-shadow: 0 4px 20px rgba(13,47,94,.3);
    display: flex; align-items: center; gap: 8px;
    z-index: 100; transition: background .15s;
  }
  .admin-toggle-btn:hover { background: var(--blue); }
  .admin-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(13,47,94,.45); z-index: 200;
    align-items: center; justify-content: center; padding: 1rem;
  }
  .admin-overlay.show { display: flex; }
  .admin-modal {
    background: var(--white); border-radius: 16px; padding: 2rem;
    width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto;
  }
  .admin-modal h2 { font-size: 18px; font-weight: 700; color: var(--navy); margin-bottom: 1.25rem; }
  .admin-close { float: right; background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-muted); line-height: 1; margin-top: -4px; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-sub); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em; }
  .form-group input, .form-group select {
    width: 100%; padding: 9px 12px; border-radius: 8px;
    border: 1.5px solid var(--border);
    font-family: 'Sarabun', sans-serif; font-size: 14px; color: var(--text);
    background: var(--bg); outline: none; transition: border-color .15s;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--blue-mid); background: var(--white); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn-primary {
    width: 100%; padding: 11px; background: var(--navy); color: #fff;
    border: none; border-radius: 8px;
    font-family: 'Sarabun', sans-serif; font-size: 15px; font-weight: 600;
    cursor: pointer; margin-top: 4px; transition: background .15s;
  }
  .btn-primary:hover { background: var(--blue); }
  .pin-wrap { margin-bottom: 1.25rem; }
  .pin-feedback { font-size: 13px; margin-top: 6px; height: 18px; }
  .pin-feedback.ok { color: #2e7d32; }
  .pin-feedback.err { color: #c62828; }
  .del-btn {
    position: absolute; top: 10px; right: 10px;
    background: none; border: none; color: #e24b4a;
    cursor: pointer; font-size: 14px; opacity: 0;
    padding: 4px 6px; border-radius: 6px; transition: opacity .15s, background .15s;
  }
  .card:hover .del-btn { opacity: 1; }
  .del-btn:hover { background: #fce4e4; }

  footer { text-align: center; padding: 1.5rem; font-size: 12px; color: var(--text-muted); border-top: 1px solid var(--border); }

  @media(max-width:600px){
    .header-inner { flex-direction: column; align-items: center; gap: 1rem; }
    .header-text { text-align: center; }
    .header-logo { width: 90px; }
    .site-header h1 { font-size: 17px; }
    .stats-bar { flex-wrap: wrap; }
    .stat-item { min-width: 50%; border-right: none; border-bottom: 1px solid var(--border); }
    .tab-wrap { padding: 1rem 1rem .5rem; gap: 6px; }
    .content { padding: 1rem 1rem 3rem; }
    .card { flex-direction: column; gap: 8px; }
    .card-date { min-width: unset; width: fit-content; }
    .form-row { grid-template-columns: 1fr; }
    .admin-modal { padding: 1.25rem; }
    .admin-toggle-btn { bottom: 16px; right: 16px; padding: 10px 16px; font-size: 13px; }
  }
</style>
</head>
